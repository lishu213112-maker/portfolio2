<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Calculator</title>

<style>
       *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at left,#00d4ff,#0b0b2d 40%),
    radial-gradient(circle at right,#8a2be2,transparent 30%);
    padding:20px;
}

.calculator{
    width:420px;
    background:rgba(15,15,35,0.95);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:20px;
    box-shadow:0 0 40px rgba(53, 52, 52, 0.5);
}

.top-bar{
    display:flex;
    justify-content:space-between;
    color:#cfcfcf;
    font-size:14px;
    margin-bottom:15px;
    letter-spacing:2px;
}

.display{
    width:100%;
    height:90px;
    border:none;
    outline:none;
    border-radius:15px;
    background:#09091c;
    color:white;
    font-size:38px;
    text-align:right;
    padding:20px;
    margin-bottom:20px;
    box-shadow:inset 0 0 10px rgba(0,0,0,0.5);
}

.buttons{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
}

button{
    height:60px;
    border:none;
    border-radius:12px;
    background:#2b2b48;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(5px);
}

.num{
    background:#323252;
}

.operator{
    background:#5a2d91;
    color:white;
    font-weight:bold;
}

.equal{
    grid-column:span 2;
    background:linear-gradient(90deg,#00cfff,#7b2cff);
    color:white;
    font-size:24px;
    font-weight:bold;
}

button:nth-child(3),
button:nth-child(4){
    background:#b22222;
}

button:nth-child(6),
button:nth-child(7),
button:nth-child(8),
button:nth-child(9),
button:nth-child(10),
button:nth-child(11),
button:nth-child(12),
button:nth-child(13),
button:nth-child(14){
    background:#3d2460;
}

@media(max-width:480px){

    .calculator{
        width:100%;
    }

    .display{
        font-size:30px;
    }

    button{
        height:55px;
        font-size:16px;
    }

    .equal{
        font-size:20px;
    }
}
</style>

</head>
<body>

<div class="calculator">

    <div class="top-bar">
        <span>SCIENTIFIC</span>
        <span>PRO-X</span>
    </div>

    <input type="text" id="display" class="display" readonly>

    <div class="buttons">

        <button onclick="appendValue('(')">(</button>
        <button onclick="appendValue(')')">)</button>
        <button onclick="clearDisplay()">AC</button>
        <button onclick="deleteLast()">DEL</button>
        <button onclick="appendValue('%')">%</button>

        <button onclick="calculateSin()">sin</button>
        <button onclick="calculateCos()">cos</button>
        <button onclick="calculateTan()">tan</button>
        <button onclick="calculateLog()">log</button>
        <button onclick="calculateLn()">ln</button>

        <button onclick="square()">x²</button>
        <button onclick="cube()">x³</button>
        <button onclick="insertPi()">π</button>
        <button onclick="insertE()">e</button>
        <button class="operator" onclick="appendValue('/')">÷</button>
        
        <button class="num" onclick="appendValue('7')">7</button>
        <button class="num" onclick="appendValue('8')">8</button>
        <button class="num" onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('*')">×</button>
        <button class="operator" onclick="appendValue('-')">−</button>

        <button class="num" onclick="appendValue('4')">4</button>
        <button class="num" onclick="appendValue('5')">5</button>
        <button class="num" onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('+')">+</button>
        <button class="num" onclick="appendValue('1')">1</button>

        <button class="num" onclick="appendValue('2')">2</button>
        <button class="num" onclick="appendValue('3')">3</button>
        <button class="num" onclick="appendValue('0')">0</button>
        <button class="num" onclick="appendValue('.')">.</button>

        <button class="equal" onclick="calculate()">=</button>

    </div>

</div>

<script>
        const display = document.getElementById("display");

// Number ya operator add karna
function appendValue(value) {
    display.value += value;
}

// Display clear
function clearDisplay() {
    display.value = "";
}

// Last character delete
function deleteLast() {
    display.value = display.value.slice(0, -1);
}

// PI
function insertPi() {
    display.value += Math.PI;
}

// Euler Number
function insertE() {
    display.value += Math.E;
}

// Square
function square() {
    try {
        display.value = Math.pow(eval(display.value), 2);
    } catch {
        display.value = "Error";
    }
}

// Sin (Degree)
function calculateSin() {
    try {
        let value = eval(display.value);
        display.value = Math.sin(value * Math.PI / 180).toFixed(8);
    } catch {
        display.value = "Error";
    }
}

// Cos (Degree)
function calculateCos() {
    try {
        let value = eval(display.value);
        display.value = Math.cos(value * Math.PI / 180).toFixed(8);
    } catch {
        display.value = "Error";
    }
}

// Tan (Degree)
function calculateTan() {
    try {
        let value = eval(display.value);
        display.value = Math.tan(value * Math.PI / 180).toFixed(8);
    } catch {
        display.value = "Error";
    }
}

// Log Base 10
function calculateLog() {
    try {
        let value = eval(display.value);
        display.value = Math.log10(value).toFixed(8);
    } catch {
        display.value = "Error";
    }
}

// Natural Log
function calculateLn() {
    try {
        let value = eval(display.value);
        display.value = Math.log(value).toFixed(8);
    } catch {
        display.value = "Error";
    }
}

// Cube
function cube() {
    try {
        display.value = Math.pow(eval(display.value), 3);
    } catch {
        display.value = "Error";
    }
}

// Square Root
function squareRoot() {
    try {
        display.value = Math.sqrt(eval(display.value)).toFixed(8);
    } catch {
        display.value = "Error";
    }
}

// Power
function power() {
    display.value += "**";
}

// Main Calculate
function calculate() {
    try {
        let expression = display.value
            .replace(/×/g, "*")
            .replace(/÷/g, "/");

        let result = eval(expression);

        if (result === Infinity || isNaN(result)) {
            display.value = "Error";
        } else {
            display.value = result;
        }

    } catch {
        display.value = "Error";
    }
}
</script>

</body>
</html>
