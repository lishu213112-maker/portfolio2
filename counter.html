<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <style>
    
body{

    margin:0;

    display:flex;

    justify-content:center;

    align-items:center;

    min-height:100vh;

    background:linear-gradient(
        135deg,
        #0f172a,
        #111827,
        #1e1b4b,
        #312e81
    );

    overflow:hidden;
}

.counter-container{

    background:rgba(255,255,255,0.08);

    padding:50px;

    border-radius:30px;

    backdrop-filter:blur(12px);
    text-align:center;
    transition:0.4s;
    box-shadow:0px 20px 50px rgba(0,0,0,0.4);

    border:1px solid rgba(255,255,255,0.1);
}
.counter-container:hover{
    background: #023d57;
    transform:scale(1.1);
}
.container{
    align-items: center;
    text-align: center;
    width: 1400px;
    background: darkcyan;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0, 0,0,0.2);
}
#count{
    font-size: 25px;
    font-weight: bold;
}
.counter-box{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:20px;

    margin-top:30px;
}

button{

    width:60px;

    height:60px;

    border:none;

    border-radius:15px;

    background:linear-gradient(to right,#38bdf8,#8b5cf6);

    color:white;

    font-size:28px;

    cursor:pointer;

    transition:0.4s;
}

button:hover{

    transform:scale(1.1);

    box-shadow:0px 10px 25px rgba(139,92,246,0.5);
}

#count{

    font-size:40px;

    font-weight:bold;

    color:white;

    width:60px;
}

h1{

    color:white;

    font-size:50px;

    margin:0;
}
</style>
</head>
<body>
    <div class="counter-container">

    <h1>Counter</h1>

    <div class="counter-box">

        <button id="minus">-</button>

        <span id="count">0</span>

        <button id="plus">+</button>

    </div>

</div>
    <script>
let count = 0

const countText = document.getElementById("count")

const plusBtn = document.getElementById("plus")

const minusBtn = document.getElementById("minus")


plusBtn.addEventListener("click", function(){

    count++

    countText.textContent = count

})


minusBtn.addEventListener("click", function(){

    count--

    countText.textContent = count

})


     
</script>
</body>
</html>v
