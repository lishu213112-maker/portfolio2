<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME</title>
    <style>
body{
    background-color: black;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;

    font-family: Arial;
}


.container{
    text-align:center;
}


h1{
    color: cyan;

    text-shadow: 0px 0px 10px cyan;
}


#status{
    color: lime;

    text-shadow: 0px 0px 10px lime;
}


.board{
    display:grid;

    grid-template-columns: repeat(3,100px);

    gap:10px;

    justify-content:center;

    margin:20px 0;
}


.cell{

    width:100px;
    height:100px;

    border:2px solid cyan;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:40px;
    color:white;

    cursor:pointer;

    box-shadow: 0px 0px 10px cyan;

    transition:0.3s;

}


.cell:hover{

    background-color: cyan;

    color:black;

    transform:scale(1.1);

    box-shadow: 0px 0px 20px cyan;

}


#button{

    background-color:black;

    color:cyan;

    border:2px solid cyan;

    padding:10px 20px;

    font-size:18px;

    cursor:pointer;

    border-radius:10px;

    transition:0.3s;

    box-shadow:0px 0px 10px cyan;

}


#button:hover{

    background-color:cyan;

    color:black;

    transform:scale(1.1);

    box-shadow:0px 0px 20px cyan;

}
</style>
</head>
<body>
   <!DOCTYPE html>
<html lang="en">

<head>
    <title id="clr">Tic Tac Toe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Tic Tac Toe Game</h1>

        <div class="board">

            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>

            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>

            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>

        </div>

        <h2 id="status">Player X Turn</h2>

        <button id="button">Restart Game</button>

    </div>
    <script>
         // new code

let cells = document.querySelectorAll(".cell")

let statusText = document.querySelector("#status")

let restartBtn = document.querySelector("#button")

let currentPlayer = "X"

let gameRunning = true


let winPatterns = [

    [0,1,2],
    [3,4,5],
    [6,7,8],

    [0,3,6],
    [1,4,7],
    [2,5,8],

    [0,4,8],
    [2,4,6]

]



cells.forEach(function(cell){

    cell.addEventListener("click", cellClicked)

})



function cellClicked(){


    if(this.textContent != "" || !gameRunning){

        return

    }


    this.textContent = currentPlayer



    if(currentPlayer == "X"){

        this.style.color="light"

    }

    else{

        this.style.color = "hotpink"

    }



    checkWinner()

}



function checkWinner(){

    let roundWon = false



    for(let i = 0; i < winPatterns.length; i++){


        let pattern = winPatterns[i]


        let cell1 = cells[pattern[0]].textContent
        let cell2 = cells[pattern[1]].textContent
        let cell3 = cells[pattern[2]].textContent



        if(cell1 == "" || cell2 == "" || cell3 == ""){

            continue

        }



        if(cell1 == cell2 && cell2 == cell3){


            cells[pattern[0]].style.backgroundColor = "lime"

            cells[pattern[1]].style.backgroundColor = "lime"

            cells[pattern[2]].style.backgroundColor = "lime"


            roundWon = true

            break

        }

    }



    if(roundWon){

        statusText.textContent = `Player ${currentPlayer} Wins`

        statusText.style.color = "lime"

        gameRunning = false

        return

    }



    let filled = true



    cells.forEach(function(cell){

        if(cell.textContent == ""){

            filled = false

        }

    })



    if(filled){

        statusText.textContent = "Match Draw"

        statusText.style.color = "orange"

        gameRunning = false

        return

    }



    changePlayer()

}



function changePlayer(){


    if(currentPlayer == "X"){

        currentPlayer = "O"

    }

    else{

        currentPlayer = "X"

    }



    statusText.textContent = `Player ${currentPlayer} Turn`

}



button.addEventListener("click", restartGame)



function restartGame(){


    cells.forEach(function(cell){


        cell.textContent = ""

        cell.style.backgroundColor = ""

    })



    currentPlayer = "X"

    gameRunning = true


    statusText.textContent = "Player X Turn"

    statusText.style.color = "white"

}
</script>
</body>
</html>
