   <style>
    *{

   font-family:Arial, Helvetica, sans-serif;
}

body{
   width:100%;
   height:100vh;

   display:flex;
   justify-content:center;

/* MAIN BIG CONTAINER */

.main-container{

}

/* LEFT SIDE */

.left-side{

   position:relative;

   overflow:hidden;
}

/* RIGHT SIDE */

.right-side{

   width:55%;

   padding:80px;

   display:flex;

   justify-content:center;
}

.right-side h1{
    font-family: Verdana, Geneva, Tahoma, sans-serif;
    color:white;
    font-size: 65px;
    top: 106px;
    left: 566px;
    margin-bottom:15px;
    line-height: 100%;
}

.right-side p{

   color:#9ca3af;

   margin-bottom:40px;
}

input{

   width:100%;

   padding:18px;

   margin-bottom:20px;

   border:2px solid #374151;

   background:transparent;

   border-radius:10px;

   color:white;

   font-size:16px;

   outline:none;
}

button{

   padding:18px;

   border:none;

   border-radius:5px;

   background:#facc15;

   color:black;

   font-size:18px;

   cursor:pointer;

   margin-top:10px;

#txt{
      font-weight: bold;
}
/* BIG YELLOW HALF CIRCLE */

.yellow-circle{

   width:946px;
   height:946px;

   border-radius:50%;

   position:absolute;

   top:-113px;
}

/* BLUE SMALL HALF CIRCLE */

.blue-circle{

   width:416.37px;
   height:416.37px;

   background:#2563eb;

   border-radius:50%;

   position:absolute;

   left:-208.19px;

   top:151.81px;
}
