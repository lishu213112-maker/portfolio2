    height:350px;

    left:-100px;

    filter:blur(120px);

    opacity:0.6;

.bg2{

.container{

  border-radius: 25px;

  backdrop-filter: blur(15px);

h1{

  background:rgba(255, 255,255, 0.1);

  border-radius:15px;

input{
  width:90%;
  padding:18px;
  border:none;
  background:rgba(255,255,255,0.08);
  color: white;
  outline:none;
  border-radius:15px;
  margin-bottom:20px;
  font-size:16px;
  border: 1px solid rgba(255,255,255,0.1);

button{

    width:95%;

    padding:18px;

    border:none;

    border-radius:15px;

    background:linear-gradient(
        to right,
        #7c3aed,
        #06b6d4

    color:white;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;

button:hover{
  background:#0ea5e9;
  transform: translateY(-3px);
  box-shadow: 0 10px 25px rgba(6,182,212,0.4);
}

.hidden{
  display:none;
}

#result{
  margin-top:30px;
  width: 100%;
  color: white;
  display:grid;
  gap:20px;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
}

article{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
}
article :hover{
    transform: translateY(-5px);
}

article img{
  width:100%;
  border-radius:10px;
}

.foot{
  margin-bottom:0px;
  margin-top:35px;
  position: fixed;
  bottom: 200px;
  width: 100%;
  text-align: center;
  color:white;
  font-size: 14px;
}

  display:inline-block;

.loader{
    width: 50px;
    height: 50px;
    border: 5px solid white;
    border-top: 5px solid cyan;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}
@keyframes spin {
    100%{
        transform: rotate(360deg);
    }
    
} 
@keyframes float{
  0%{
    transform: translateY(0px);
  }
  50%{
    transform: translateY(-15px);
  }
  100%{
    transform: translateY(0px);
  }
}
.video-card{
  margin-top: 20px;
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 20px;

}
.download-btn{
  margin-top: 15px;
  width: 100%;
}

const submit = document.getElementById('submit');

const link = document.getElementById('link');

const result = document.getElementById('result');

link.oninput = function(){

    if(this.value === ''){

        this.removeAttribute('aria-invalid');

    }

    else if(validateInput()){

        this.setAttribute('aria-invalid','false');

    }

    else{

        this.setAttribute('aria-invalid','true');
    }
}

/* URL VALIDATION */

function validateInput(){

    var match = link.value.trim().match(

    /^https?:\/\/(www\.)?threads\.net\/t\/(.+)$/

    );

    return match && match[0];
}

/* BUTTON CLICK */

submit.onclick = async function(){

    submit.disabled = true;

    if(link.getAttribute('aria-invalid') !== 'false'){

        alert("Enter Valid Threads URL");

        submit.disabled = false;

        return;
    }

    try{

        result.innerHTML =
        "<p>Loading...</p>";

        var formattedResult = '';

        var url = validateInput();

        var res = await fetch(

        'https://api.threadsdownloader.io/load?url=' + url

        );

        var json = await res.json();

        console.log(json);

        if(json.status != 'OK'){

            throw new Error(json.status);
        }

        var videoCounter = 0;

        json.media.forEach((each)=>{

            if(each.type == 'video'){

                videoCounter++;

                formattedResult += `

                <div class="video-card">

                    <video controls width="100%">

                        <source src="${each.url}">

                    </video>

                    <a href="${each.url}" download>

                        <button class="download-btn">

                        Download Video #${videoCounter}

                        </button>

                    </a>

                </div>

                `;
            }

        });

        result.innerHTML = formattedResult;

    }

    catch(error){

        alert("Something Went Wrong");
        console.log(error);
    }

    submit.disabled = false;
}
</script>
